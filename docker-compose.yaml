version: '3.8'

services:

  mongodb:
    image: mongo:latest
    container_name: rdd_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

  redis:
    image: redis:7-alpine
    container_name: rdd_redis
    restart: always
    ports:
      - "6379:6379"